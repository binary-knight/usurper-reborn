name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      deploy_server:
        description: 'Deploy to production server'
        type: boolean
        default: false

env:
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1
  DOTNET_VERSION: '8.0.x'

# ═══════════════════════════════════════════════════════════════════
# Job dependency graph:
#
#   test ──┬── build (matrix: 6 platforms) ──┬── smoke-test (matrix: 4 platforms)
#          │                                  ├── bundle-desktop (WezTerm, release only)
#          │                                  ├── deploy-server (release or manual)
#          │                                  │
#          └── build-steam (matrix: 4, rel) ──┤
#                                             │
#                                    attach-to-release (release only)
#                                    steam-package (release only) ── steam-upload
# ═══════════════════════════════════════════════════════════════════

jobs:

  # ─── TEST ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build
        run: dotnet build usurper-reloaded.csproj -c Release

      - name: Run tests
        run: dotnet test Tests/Tests.csproj -c Release --no-build --verbosity normal --logger "console;verbosity=detailed"

  # ─── BUILD (6 platforms, parallel matrix) ────────────────────────
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64,     name: Windows x64,  artifact: windows-x64-build, platform: windows }
          - { rid: win-x86,     name: Windows x86,  artifact: windows-x86-build, platform: windows }
          - { rid: linux-x64,   name: Linux x64,    artifact: linux-x64-build,   platform: linux }
          - { rid: linux-arm64, name: Linux ARM64,   artifact: linux-arm64-build, platform: linux }
          - { rid: osx-x64,     name: macOS Intel,  artifact: mac-build,         platform: macos }
          - { rid: osx-arm64,   name: macOS ARM64,  artifact: mac-arm64-build,   platform: macos }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish
        run: |
          dotnet publish usurper-reloaded.csproj -c Release -r ${{ matrix.rid }} -o build/ \
            -p:PublishSingleFile=true -p:SelfContained=true -p:InvariantGlobalization=true
          echo "Build output:"
          ls -lh build/ | head -5

      - name: Add launchers (Windows)
        if: matrix.platform == 'windows'
        run: |
          cp launchers/UsurperReborn.bat build/
          cp scripts-server/updatecheck.ps1 build/

      - name: Add launchers (Linux)
        if: matrix.platform == 'linux'
        run: |
          chmod +x build/UsurperReborn
          cp launchers/usurper-reborn.sh build/ && chmod +x build/usurper-reborn.sh
          cp scripts-server/updatecheck.sh build/ && chmod +x build/updatecheck.sh

      - name: Create app bundle (macOS)
        if: matrix.platform == 'macos'
        run: |
          VERSION="${{ github.event.release.tag_name || '0.0.0-dev' }}"
          VERSION="${VERSION#v}"
          ARCH=${{ matrix.rid == 'osx-arm64' && 'arm64' || 'x86_64' }}

          # Move publish output aside, rebuild as app bundle
          mv build publish-out
          mkdir -p build/usurper-reborn.app/Contents/MacOS
          mkdir -p build/usurper-reborn.app/Contents/Resources

          cp publish-out/UsurperReborn build/usurper-reborn.app/Contents/MacOS/usurper-reborn
          chmod +x build/usurper-reborn.app/Contents/MacOS/usurper-reborn
          cp -r publish-out/* build/usurper-reborn.app/Contents/Resources/ 2>/dev/null || true

          cat > build/usurper-reborn.app/Contents/Info.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>usurper-reborn</string>
            <key>CFBundleIdentifier</key>
            <string>com.usurperreloaded.game</string>
            <key>CFBundleName</key>
            <string>Usurper Reborn</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>LSArchitecturePriority</key>
            <array>
              <string>${ARCH}</string>
            </array>
          </dict>
          </plist>
          PLIST

          cp launchers/usurper-reborn-mac.command build/
          chmod +x build/usurper-reborn-mac.command
          rm -rf publish-out

      - name: Add GPL compliance files
        run: |
          cp LICENSE build/
          cp dist/GPL_NOTICE.txt build/
          cp dist/README.txt build/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/

  # ─── SMOKE TESTS (4 platforms, parallel matrix) ──────────────────
  smoke-test:
    name: Smoke test ${{ matrix.name }}
    needs: [build]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            artifact: windows-x64-build
            runner: windows-latest
            exe: build/UsurperReborn.exe
          - name: Linux
            artifact: linux-x64-build
            runner: ubuntu-latest
            exe: build/UsurperReborn
          - name: macOS Intel (Rosetta)
            artifact: mac-build
            runner: macos-14
            exe: build/usurper-reborn.app/Contents/MacOS/usurper-reborn
            prefix: arch -x86_64
          - name: macOS ARM64
            artifact: mac-arm64-build
            runner: macos-14
            exe: build/usurper-reborn.app/Contents/MacOS/usurper-reborn
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/

      - name: Run executable
        shell: bash
        run: |
          chmod +x "${{ matrix.exe }}" 2>/dev/null || true
          ${{ matrix.prefix }} "${{ matrix.exe }}" --help && echo "Passed" || echo "Non-zero exit OK for --help"

  # ─── BUILD STEAM (4 platforms, parallel matrix, release only) ────
  build-steam:
    name: Build Steam ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64,    name: Windows,     artifact: steam-windows }
          - { rid: linux-x64,  name: Linux,       artifact: steam-linux }
          - { rid: osx-x64,    name: macOS Intel, artifact: steam-macos-x64 }
          - { rid: osx-arm64,  name: macOS ARM64, artifact: steam-macos-arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish Steam build
        run: |
          dotnet publish usurper-reloaded.csproj -c Steam -r ${{ matrix.rid }} -o build/ \
            -p:PublishSingleFile=true -p:SelfContained=true -p:InvariantGlobalization=true

      - name: Add launchers and localization
        run: |
          cp -r Localization build/ 2>/dev/null || true
          RID="${{ matrix.rid }}"
          if [[ "$RID" == win-* ]]; then
            cp launchers/Play.bat build/
            cp launchers/Play-Accessible.bat build/
          elif [[ "$RID" == linux-* ]]; then
            chmod +x build/UsurperReborn
            cp launchers/play.sh build/ && chmod +x build/play.sh
            cp launchers/play-accessible.sh build/ && chmod +x build/play-accessible.sh
          elif [[ "$RID" == osx-* ]]; then
            chmod +x build/UsurperReborn 2>/dev/null || true
            cp launchers/play-mac.sh build/play.sh 2>/dev/null || cp launchers/play.sh build/play.sh
            cp launchers/play-mac-accessible.sh build/play-accessible.sh 2>/dev/null || cp launchers/play-accessible.sh build/play-accessible.sh
            chmod +x build/play.sh build/play-accessible.sh
          fi

      - name: Add GPL compliance files
        run: |
          cp LICENSE build/
          cp dist/GPL_NOTICE.txt build/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/

  # ─── BUNDLE DESKTOP (WezTerm + plain builds, release only) ──────
  bundle-desktop:
    name: Bundle Desktop (WezTerm)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Download plain build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build"

      - name: Resolve WezTerm version
        id: wezterm
        run: |
          VER=$(curl -sL https://api.github.com/repos/wezterm/wezterm/releases/latest | \
            python3 -c "import json,sys; print(json.load(sys.stdin).get('tag_name',''))")
          [ -z "$VER" ] && { echo "ERROR: Could not resolve WezTerm version"; exit 1; }
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "WezTerm version: $VER"

      - name: Cache WezTerm downloads
        uses: actions/cache@v4
        with:
          path: wezterm-cache
          key: wezterm-${{ steps.wezterm.outputs.version }}

      - name: Download WezTerm
        env:
          VER: ${{ steps.wezterm.outputs.version }}
        run: |
          mkdir -p wezterm-cache
          BASE="https://github.com/wezterm/wezterm/releases/download/$VER"
          [ -f "wezterm-cache/wezterm-win.zip" ] || \
            curl -fSL -o "wezterm-cache/wezterm-win.zip" "$BASE/WezTerm-windows-${VER}.zip"
          [ -f "wezterm-cache/wezterm-linux.AppImage" ] || \
            curl -fSL -o "wezterm-cache/wezterm-linux.AppImage" "$BASE/WezTerm-${VER}-Ubuntu20.04.AppImage"
          [ -f "wezterm-cache/wezterm-macos.zip" ] || \
            curl -fSL -o "wezterm-cache/wezterm-macos.zip" "$BASE/WezTerm-macos-${VER}.zip"

      - name: Install wine + rcedit (for icon patching)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 > /dev/null 2>&1
          curl -fSL -o /tmp/rcedit-x64.exe \
            "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe"

      - name: Bundle Windows x64 Desktop
        run: |
          mkdir -p desktop/UsurperReborn-win64/wezterm
          unzip -qo wezterm-cache/wezterm-win.zip -d /tmp/wez-tmp
          WEZDIR=$(find /tmp/wez-tmp -name "wezterm-gui.exe" -type f -printf '%h\n' 2>/dev/null | head -1)
          [ -n "$WEZDIR" ] && cp -r "$WEZDIR"/* desktop/UsurperReborn-win64/wezterm/ || { echo "ERROR: wezterm-gui.exe not found"; exit 1; }
          rm -rf /tmp/wez-tmp

          # Patch WezTerm icon with game icon
          wine /tmp/rcedit-x64.exe \
            "desktop/UsurperReborn-win64/wezterm/wezterm-gui.exe" \
            --set-icon "app.ico" 2>/dev/null || echo "Icon patching failed (non-critical)"

          # Copy game files + launchers
          cp -r windows-x64-build/* desktop/UsurperReborn-win64/
          cp wezterm.lua desktop/UsurperReborn-win64/
          cp launchers/Play.bat desktop/UsurperReborn-win64/
          cp launchers/Play-Accessible.bat desktop/UsurperReborn-win64/
          cp -r fonts desktop/UsurperReborn-win64/

      - name: Bundle Linux x64 Desktop
        run: |
          mkdir -p desktop/UsurperReborn-linux64/wezterm
          cp wezterm-cache/wezterm-linux.AppImage desktop/UsurperReborn-linux64/wezterm/wezterm-gui
          chmod +x desktop/UsurperReborn-linux64/wezterm/wezterm-gui
          cp -r linux-x64-build/* desktop/UsurperReborn-linux64/
          chmod +x desktop/UsurperReborn-linux64/UsurperReborn
          cp wezterm.lua desktop/UsurperReborn-linux64/
          cp launchers/play.sh desktop/UsurperReborn-linux64/
          cp launchers/play-accessible.sh desktop/UsurperReborn-linux64/
          chmod +x desktop/UsurperReborn-linux64/play.sh desktop/UsurperReborn-linux64/play-accessible.sh
          cp -r fonts desktop/UsurperReborn-linux64/

      - name: Bundle macOS x64 Desktop
        run: |
          mkdir -p desktop/UsurperReborn-macos/wezterm
          unzip -qo wezterm-cache/wezterm-macos.zip -d /tmp/wez-tmp
          WEZGUI=$(find /tmp/wez-tmp -name "wezterm-gui" -type f 2>/dev/null | head -1)
          [ -n "$WEZGUI" ] && cp "$WEZGUI" desktop/UsurperReborn-macos/wezterm/wezterm-gui || { echo "ERROR: wezterm-gui not found"; exit 1; }
          chmod +x desktop/UsurperReborn-macos/wezterm/wezterm-gui
          rm -rf /tmp/wez-tmp

          # Copy game executable from app bundle
          if [ -f "mac-build/usurper-reborn.app/Contents/MacOS/usurper-reborn" ]; then
            cp mac-build/usurper-reborn.app/Contents/MacOS/usurper-reborn desktop/UsurperReborn-macos/UsurperReborn
          fi
          chmod +x desktop/UsurperReborn-macos/UsurperReborn 2>/dev/null || true
          cp mac-build/LICENSE desktop/UsurperReborn-macos/ 2>/dev/null || true
          cp mac-build/GPL_NOTICE.txt desktop/UsurperReborn-macos/ 2>/dev/null || true
          cp mac-build/README.txt desktop/UsurperReborn-macos/ 2>/dev/null || true
          cp wezterm.lua desktop/UsurperReborn-macos/
          cp launchers/play.sh desktop/UsurperReborn-macos/
          cp launchers/play-accessible.sh desktop/UsurperReborn-macos/
          chmod +x desktop/UsurperReborn-macos/play.sh desktop/UsurperReborn-macos/play-accessible.sh
          cp -r fonts desktop/UsurperReborn-macos/

      - name: Create desktop distribution archives
        run: |
          cd desktop
          zip -qr ../UsurperReborn-WezTerm-Windows-x64.zip UsurperReborn-win64/
          tar -czf ../UsurperReborn-WezTerm-Linux-x64.tar.gz UsurperReborn-linux64/
          zip -qr ../UsurperReborn-WezTerm-macOS-x64.zip UsurperReborn-macos/
          cd ..
          ls -lh UsurperReborn-WezTerm-*

      - name: Upload WezTerm Windows x64
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x64
          path: UsurperReborn-WezTerm-Windows-x64.zip

      - name: Upload WezTerm Linux x64
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-x64
          path: UsurperReborn-WezTerm-Linux-x64.tar.gz

      - name: Upload WezTerm macOS x64
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-x64
          path: UsurperReborn-WezTerm-macOS-x64.zip

  # ─── STEAM PACKAGE (assemble depots, release only) ──────────────
  steam-package:
    name: Package Steam Depots
    runs-on: ubuntu-latest
    needs: [build-steam, bundle-desktop]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Download Steam build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "steam-*"

      - name: Resolve WezTerm version
        id: wezterm
        run: |
          VER=$(curl -sL https://api.github.com/repos/wezterm/wezterm/releases/latest | \
            python3 -c "import json,sys; print(json.load(sys.stdin).get('tag_name',''))")
          [ -z "$VER" ] && { echo "ERROR: Could not resolve WezTerm version"; exit 1; }
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Cache WezTerm downloads
        uses: actions/cache@v4
        with:
          path: wezterm-cache
          key: wezterm-${{ steps.wezterm.outputs.version }}

      - name: Download WezTerm (cache hit expected from bundle-desktop)
        env:
          VER: ${{ steps.wezterm.outputs.version }}
        run: |
          mkdir -p wezterm-cache
          BASE="https://github.com/wezterm/wezterm/releases/download/$VER"
          [ -f "wezterm-cache/wezterm-win.zip" ] || \
            curl -fSL -o "wezterm-cache/wezterm-win.zip" "$BASE/WezTerm-windows-${VER}.zip"
          [ -f "wezterm-cache/wezterm-linux.AppImage" ] || \
            curl -fSL -o "wezterm-cache/wezterm-linux.AppImage" "$BASE/WezTerm-${VER}-Ubuntu20.04.AppImage"
          [ -f "wezterm-cache/wezterm-macos.zip" ] || \
            curl -fSL -o "wezterm-cache/wezterm-macos.zip" "$BASE/WezTerm-macos-${VER}.zip"

      - name: Organize Steam depots
        run: |
          mkdir -p steam-build/depot-windows steam-build/depot-linux steam-build/depot-macos

          # Move Steam build artifacts into depots
          cp -r steam-windows/* steam-build/depot-windows/
          cp -r steam-linux/* steam-build/depot-linux/

          # macOS: combine x64 + arm64 into one depot with architecture suffixes
          cp steam-macos-x64/UsurperReborn steam-build/depot-macos/UsurperReborn-x64
          cp steam-macos-arm64/UsurperReborn steam-build/depot-macos/UsurperReborn-arm64
          chmod +x steam-build/depot-macos/UsurperReborn-x64 steam-build/depot-macos/UsurperReborn-arm64

          # Copy macOS launchers and localization from x64 build
          cp -r steam-macos-x64/Localization steam-build/depot-macos/ 2>/dev/null || true
          cp steam-macos-x64/play.sh steam-build/depot-macos/ 2>/dev/null || true
          cp steam-macos-x64/play-accessible.sh steam-build/depot-macos/ 2>/dev/null || true
          chmod +x steam-build/depot-macos/play.sh steam-build/depot-macos/play-accessible.sh 2>/dev/null || true

      - name: Download Steamworks.NET native libraries
        run: |
          SWNET_VERSION="20.1.0"
          wget -q "https://github.com/rlabrecque/Steamworks.NET/releases/download/${SWNET_VERSION}/Steamworks.NET-Standalone_${SWNET_VERSION}.zip" \
            -O /tmp/steamworks.zip || true

          if [ -f "/tmp/steamworks.zip" ]; then
            unzip -q /tmp/steamworks.zip -d /tmp/steamworks || true
            WIN_DLL=$(find /tmp/steamworks -name "steam_api64.dll" -type f 2>/dev/null | head -1)
            LINUX_SO=$(find /tmp/steamworks -name "libsteam_api.so" -type f 2>/dev/null | head -1)
            MAC_DYLIB=$(find /tmp/steamworks -name "libsteam_api.dylib" -type f 2>/dev/null | head -1)
            [ -n "$WIN_DLL" ] && cp "$WIN_DLL" steam-build/depot-windows/ && echo "Copied steam_api64.dll"
            [ -n "$LINUX_SO" ] && cp "$LINUX_SO" steam-build/depot-linux/ && echo "Copied libsteam_api.so"
            [ -n "$MAC_DYLIB" ] && cp "$MAC_DYLIB" steam-build/depot-macos/ && echo "Copied libsteam_api.dylib"
            rm -rf /tmp/steamworks /tmp/steamworks.zip
          else
            echo "WARNING: Could not download Steamworks.NET release"
          fi

          # Verify critical files
          [ ! -f "steam-build/depot-windows/steam_api64.dll" ] && echo "CRITICAL: steam_api64.dll missing!"
          [ ! -f "steam-build/depot-linux/libsteam_api.so" ] && echo "CRITICAL: libsteam_api.so missing!"

      - name: Bundle WezTerm into Steam depots
        run: |
          # Windows
          mkdir -p steam-build/depot-windows/wezterm
          unzip -qo wezterm-cache/wezterm-win.zip -d /tmp/wez-tmp
          WEZDIR=$(find /tmp/wez-tmp -name "wezterm-gui.exe" -type f -printf '%h\n' 2>/dev/null | head -1)
          [ -n "$WEZDIR" ] && cp -r "$WEZDIR"/* steam-build/depot-windows/wezterm/ || echo "WARNING: wezterm-gui.exe not found"
          rm -rf /tmp/wez-tmp

          # Linux
          mkdir -p steam-build/depot-linux/wezterm
          cp wezterm-cache/wezterm-linux.AppImage steam-build/depot-linux/wezterm/wezterm-gui
          chmod +x steam-build/depot-linux/wezterm/wezterm-gui

          # macOS
          if [ -f "wezterm-cache/wezterm-macos.zip" ]; then
            mkdir -p steam-build/depot-macos/wezterm
            unzip -qo wezterm-cache/wezterm-macos.zip -d /tmp/wez-mac-tmp
            WEZAPP=$(find /tmp/wez-mac-tmp -name "WezTerm.app" -type d 2>/dev/null | head -1)
            [ -n "$WEZAPP" ] && cp -r "$WEZAPP" steam-build/depot-macos/wezterm/
            rm -rf /tmp/wez-mac-tmp
          fi

          # Copy config and fonts to all depots
          for dir in steam-build/depot-windows steam-build/depot-linux steam-build/depot-macos; do
            cp wezterm.lua "$dir/"
            cp -r fonts "$dir/"
          done

      # NOTE: macOS WezTerm icon patching intentionally skipped.
      # Modifying files inside a .app bundle invalidates the code signature,
      # causing macOS Gatekeeper to block it with "damaged" error.
      - name: Patch WezTerm icon (Windows only)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 > /dev/null 2>&1
          curl -fSL -o /tmp/rcedit-x64.exe \
            "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe"
          wine /tmp/rcedit-x64.exe \
            "steam-build/depot-windows/wezterm/wezterm-gui.exe" \
            --set-icon "app.ico" 2>/dev/null || echo "Icon patching failed (non-critical)"

      - name: Add GPL compliance files
        run: |
          git archive --format=zip --prefix=usurper-reborn-source/ HEAD > usurper-reborn-source.zip
          for dir in steam-build/depot-windows steam-build/depot-linux steam-build/depot-macos; do
            cp LICENSE "$dir/"
            cp usurper-reborn-source.zip "$dir/"
          done

      - name: Generate Steam configuration
        env:
          STEAM_APP_ID: ${{ vars.STEAM_APP_ID || 'YOUR_STEAM_APP_ID' }}
          STEAM_DEPOT_WINDOWS: ${{ vars.STEAM_DEPOT_WINDOWS || 'YOUR_WINDOWS_DEPOT_ID' }}
          STEAM_DEPOT_LINUX: ${{ vars.STEAM_DEPOT_LINUX || 'YOUR_LINUX_DEPOT_ID' }}
          STEAM_DEPOT_MACOS: ${{ vars.STEAM_DEPOT_MACOS || 'YOUR_MACOS_DEPOT_ID' }}
        run: |
          cat > steam-build/app_build.vdf << EOF
          "appbuild"
          {
            "appid" "${STEAM_APP_ID}"
            "desc" "Usurper Reborn ${{ github.ref_name || 'dev' }} (GPL v2)"
            "buildoutput" "../steam-logs/"
            "contentroot" ""
            "setlive" ""
            "preview" "0"
            "local" ""

            "depots"
            {
              "${STEAM_DEPOT_WINDOWS}" { "FileMapping" { "LocalPath" "depot-windows/*" "DepotPath" "." "recursive" "1" } }
              "${STEAM_DEPOT_LINUX}"   { "FileMapping" { "LocalPath" "depot-linux/*"   "DepotPath" "." "recursive" "1" } }
              "${STEAM_DEPOT_MACOS}"   { "FileMapping" { "LocalPath" "depot-macos/*"   "DepotPath" "." "recursive" "1" } }
            }
          }
          EOF

          cat > steam-build/STEAM_LAUNCH_CONFIG.md << 'GUIDE'
          # Steam Launch Configuration

          ## Windows
          - Executable: `Play.bat`
          - Screen Reader: `Play-Accessible.bat` (launch option)

          ## Linux
          - Executable: `play.sh`
          - Screen Reader: `play-accessible.sh` (launch option)

          ## macOS
          - Executable: `play.sh`
          - Screen Reader: `play-accessible.sh` (launch option)

          ## Notes
          - WezTerm is bundled in `wezterm/` inside each depot
          - `wezterm.lua` configures terminal appearance
          - Font choice saved to `font-choice.txt`, applies on next launch
          GUIDE

          echo "=== Steam depot contents ==="
          for d in depot-windows depot-linux depot-macos; do
            echo "--- $d ---"
            ls steam-build/$d/ | head -10
          done

      - uses: actions/upload-artifact@v4
        with:
          name: steam-release
          path: steam-build/

  # ─── ATTACH TO RELEASE ──────────────────────────────────────────
  attach-to-release:
    name: Attach Builds to Release
    runs-on: ubuntu-latest
    needs: [build, bundle-desktop, smoke-test]
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build"

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "desktop-*"

      - name: Create GPL source archive
        run: git archive --format=zip --prefix=usurper-reborn-source/ HEAD > usurper-reborn-source.zip

      - name: Create release archives
        run: |
          TAG="${{ github.ref_name }}"

          # Plain builds: add source archive, then zip
          for entry in \
            "windows-x64-build:Windows-x64" \
            "windows-x86-build:Windows-x86" \
            "linux-x64-build:Linux-x64" \
            "linux-arm64-build:Linux-ARM64" \
            "mac-build:macOS-Intel" \
            "mac-arm64-build:macOS-AppleSilicon"; do

            DIR="${entry%%:*}"
            LABEL="${entry##*:}"
            cp usurper-reborn-source.zip "$DIR/"
            cd "$DIR" && zip -qr "../UsurperReborn-${TAG}-${LABEL}.zip" . && cd ..
          done

          # Desktop bundles: already zipped by bundle-desktop
          cp desktop-windows-x64/UsurperReborn-WezTerm-Windows-x64.zip \
            "UsurperReborn-${TAG}-WezTerm-Windows-x64.zip"
          cp desktop-linux-x64/UsurperReborn-WezTerm-Linux-x64.tar.gz \
            "UsurperReborn-${TAG}-WezTerm-Linux-x64.tar.gz"
          cp desktop-macos-x64/UsurperReborn-WezTerm-macOS-x64.zip \
            "UsurperReborn-${TAG}-WezTerm-macOS-x64.zip"

          echo "=== Release assets ==="
          ls -lh UsurperReborn-${TAG}-*

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            UsurperReborn-${{ github.ref_name }}-Windows-x64.zip
            UsurperReborn-${{ github.ref_name }}-Windows-x86.zip
            UsurperReborn-${{ github.ref_name }}-Linux-x64.zip
            UsurperReborn-${{ github.ref_name }}-Linux-ARM64.zip
            UsurperReborn-${{ github.ref_name }}-macOS-Intel.zip
            UsurperReborn-${{ github.ref_name }}-macOS-AppleSilicon.zip
            UsurperReborn-${{ github.ref_name }}-WezTerm-Windows-x64.zip
            UsurperReborn-${{ github.ref_name }}-WezTerm-Linux-x64.tar.gz
            UsurperReborn-${{ github.ref_name }}-WezTerm-macOS-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── STEAM UPLOAD ───────────────────────────────────────────────
  steam-upload:
    name: Upload to Steam
    runs-on: ubuntu-latest
    needs: [steam-package]
    if: github.event_name == 'release'
    steps:
      - name: Download Steam artifacts
        uses: actions/download-artifact@v4
        with:
          name: steam-release
          path: steam-build/

      - name: Install steamcmd
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lib32gcc-s1
          mkdir -p ~/steamcmd && cd ~/steamcmd
          curl -sqL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" | tar zxvf -

      - name: Configure Steam authentication
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          mkdir -p ~/Steam/config
          echo "$STEAM_CONFIG_VDF" | base64 -d > ~/Steam/config/config.vdf
          chmod 600 ~/Steam/config/config.vdf

      - name: Upload to Steam
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          BUILD_FILE="$(pwd)/steam-build/app_build.vdf"
          ~/steamcmd/steamcmd.sh +login "$STEAM_USERNAME" +run_app_build "$BUILD_FILE" +quit

      - name: Upload Steam logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: steam-upload-logs
          path: steam-logs/

  # ─── DEPLOY TO SERVER ──────────────────────────────────────────
  deploy-server:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    if: >-
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_server == 'true')
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Download Linux x64 build
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-build
          path: build/

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create deployment tarball
        run: cd build && tar -czf ../server.tar.gz . && cd ..

      - name: Deploy to production
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ vars.SERVER_HOST || '3.150.229.205' }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new ubuntu@$HOST"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"

          # Upload tarball
          $SCP server.tar.gz "ubuntu@$HOST:/tmp/usurper-reborn-server.tar.gz"

          # Stop services, extract, restart
          $SSH "\
            sudo systemctl stop sshd-usurper && \
            sudo systemctl stop usurper-mud && \
            sudo tar -xzf /tmp/usurper-reborn-server.tar.gz -C /opt/usurper/ && \
            sudo chmod +x /opt/usurper/UsurperReborn && \
            sudo chown -R usurper:usurper /opt/usurper && \
            echo '${VERSION#v}' | sudo tee /opt/usurper/version.txt > /dev/null && \
            sudo systemctl start usurper-mud && \
            sudo systemctl start sshd-usurper && \
            echo 'Deploy complete: ${VERSION}'"

          # Cleanup
          rm -f ~/.ssh/deploy_key
