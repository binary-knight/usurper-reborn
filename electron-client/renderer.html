<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src wss://usurper-reborn.net ws://usurper-reborn.net wss://*.usurper-reborn.net; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self';">
  <title>Usurper Reborn</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      overflow: hidden;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    }

    /* Custom title bar area */
    #titlebar {
      -webkit-app-region: drag;
      height: 32px;
      background: #0a0a1a;
      display: flex;
      align-items: center;
      padding-left: 16px;
      border-bottom: 2px solid #c0a050;
      user-select: none;
    }

    #titlebar-text {
      color: #c0a050;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #connection-status {
      margin-left: 16px;
      font-size: 11px;
      color: #5a4a28;
    }

    #connection-status.connected { color: #50c050; }
    #connection-status.connecting { color: #c0a050; }
    #connection-status.disconnected { color: #c05050; }

    #view-toggle {
      -webkit-app-region: no-drag;
      margin-left: auto;
      margin-right: 140px;
      padding: 2px 10px;
      background: #1a1a3a;
      color: #c0a050;
      border: 1px solid #3a3a6a;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      border-radius: 3px;
    }

    #view-toggle:hover {
      background: #2a2a5a;
      border-color: #c0a050;
    }

    /* Main layout — split view in dev mode */
    #main {
      position: absolute;
      top: 32px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
    }

    /* Terminal container */
    #terminal-container {
      flex: 1;
      position: relative;
      padding: 4px;
      background: #000000;
    }

    /* Parsed output panel (dev mode) */
    #parsed-panel {
      width: 400px;
      background: #0a0a1a;
      border-left: 2px solid #c0a050;
      overflow-y: auto;
      padding: 8px;
      font-size: 12px;
      display: none;
    }

    #parsed-panel.visible { display: block; }

    #parsed-panel .parsed-line {
      margin-bottom: 2px;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      line-height: 1.4;
    }

    #parsed-panel .parsed-label {
      color: #c0a050;
      font-size: 10px;
      margin-top: 8px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Gold border */
    #terminal-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-left: 2px solid #c0a050;
      border-right: 2px solid #c0a050;
      border-bottom: 2px solid #c0a050;
      pointer-events: none;
      z-index: 10;
    }

    #terminal {
      width: 100%;
      height: 100%;
    }

    /* xterm.js overrides */
    .xterm { padding: 6px; }
    .xterm-viewport::-webkit-scrollbar { width: 8px; }
    .xterm-viewport::-webkit-scrollbar-track { background: #0a0a1a; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 4px; }
    .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #c0a050; }
  </style>
  <link rel="stylesheet" href="./node_modules/@xterm/xterm/css/xterm.css">
</head>
<body>
  <div id="titlebar">
    <span id="titlebar-text">USURPER REBORN</span>
    <span id="connection-status" class="connecting">Connecting...</span>
    <button id="view-toggle" title="Switch between Terminal and Graphical view (F10)">Terminal</button>
  </div>
  <div id="main">
    <div id="terminal-container">
      <div id="terminal"></div>
    </div>
    <div id="graphical-view"></div>
    <div id="parsed-panel">
      <div class="parsed-label">Parsed Output (F9 to toggle)</div>
      <div id="parsed-output"></div>
    </div>
  </div>

  <link rel="stylesheet" href="./styles/game.css">
  <link rel="stylesheet" href="./styles/gui.css">
  <script src="./node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="./node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="./node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="./src/ansi-parser.js"></script>
  <script src="./src/pattern-matcher.js"></script>
  <script src="./src/renderer-html.js"></script>
  <script src="./src/game-ui.js"></script>
  <script src="./renderer.js"></script>
</body>
</html>
